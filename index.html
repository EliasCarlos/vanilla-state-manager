<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./ui/styles.css" />
    <title>Vanilla State Manager</title>
  </head>
  <body>
    <div class="container">
      <h1>Vanilla State Manager</h1>

      <div class="form">
        <input class="input" id="title" placeholder="Título" />
        <input class="input" id="description" placeholder="Descrição" />
        <button class="btn" id="createBtn" data-action="create-task">Criar</button>
      </div>

      <div id="modal" class="modal hidden">
        <div class="modal-content">
          <h3>Comentários</h3>
  
          <div id="modal-comments" class="comments-list"></div>
  
          <div class="modal-input-area">
            <input id="modal-input" placeholder="Escreva um comentário..." />
            <button id="modal-add" class="btn">Adicionar</button>
          </div>
  
          <button id="modal-close" class="btn btn-secondary">Fechar</button>
        </div>
      </div>

      <div id="app"></div>
    </div>

    <script type="module" src="./index.js"></script>
  </body>
</html>
